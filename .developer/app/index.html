<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perseus Local Reader</title>
    <link rel="stylesheet" href="./styles.css?v=plr-13" />
  <link rel="stylesheet" href="./data-manager.css?v=plr-1" />
    <link rel="stylesheet" href="./notes.css?v=plr-notes-1" />
</head>
  <body class="library-body">
    <header class="topbar library-topbar">
      <div class="title-block">
        <h1>Perseus Local Reader</h1>
        <p>Perseus Digital Library のギリシア語テキストと英訳を、手元で検索して読む</p>
      </div>
      <div class="library-header-actions">

        <a class="library-notes-link" href="./notes.html">メモ</a>

        <a class="library-manage-link" href="./data-manager.html">保存データを管理</a>

      </div>
    </header>

    <main class="library">
      <div class="library-search">
        <input
          id="searchBox"
          type="search"
          placeholder="著者名・作品名で検索 (例: Plato, Apology, Ὅμηρος)"
          autocomplete="off"
          autofocus
        />
        <span id="searchCount" class="search-count"></span>
      </div>

      <section id="downloadedShelf" class="shelf" hidden>
        <h2>ダウンロード済みの作品</h2>
        <div id="downloadedList" class="work-list"></div>
      </section>

      <section class="shelf">
        <h2 id="browseHeading">著者から探す</h2>
        <div id="authorList" class="author-list"></div>
      </section>
    </main>

    <div id="downloadOverlay" class="overlay" hidden>
      <div class="overlay-card">
        <h2 id="overlayTitle">ダウンロード中</h2>
        <p id="overlayDetail" class="overlay-detail"></p>
        <progress id="overlayProgress" max="1" value="0"></progress>
        <p class="overlay-note">
          この作品の全ての版(原文と翻訳)をまとめて取得しています。<br />
          完了すると、以後この作品はインターネットなしで読めます。
        </p>
        <button id="overlayClose" class="tool-button" type="button" hidden>閉じる</button>
        <button id="overlayCancel" class="tool-button" type="button">キャンセル</button>
      </div>
    </div>

    <script src="./library.js?v=plr-12"></script>
  </body>
</html>

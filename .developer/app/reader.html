<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perseus Local Reader</title>
    <link rel="stylesheet" href="./styles.css?v=plr-14" />
    <link rel="stylesheet" href="./notes.css?v=plr-notes-1" />
  <script src="./i18n.js?v=plr-i18n-1"></script>
</head>
  <body>
    <header class="topbar">
      <a class="collapsed-library-link" href="./index.html">← ライブラリへ戻る</a>
      <button
        id="toggleReaderBar"
        class="bar-toggle"
        type="button"
        aria-expanded="true"
        title="上部バーをしまう"
      >
        ↑
      </button>
      <div class="title-block">
        <div class="reader-title-row">
          <div>
            <p class="breadcrumb"><a href="./index.html">← ライブラリへ戻る</a><a class="reader-notes-inline" href="./notes.html">メモ</a></p>
            <h1 id="workTitle">読み込み中...</h1>
            <p id="workMeta"></p>
          </div>
        </div>

        <div class="reader-controls">
          <div class="reader-primary-tools">
            <div id="versionTabs" class="version-tabs" role="tablist"></div>
          </div>

          <div class="reader-jump-tools">
            <div id="chunkControls" class="chunk-controls" hidden>
              <button id="prevChunk" class="tool-button" type="button">◀ 前</button>
              <select id="chunkSelect"></select>
              <button id="nextChunk" class="tool-button" type="button">次 ▶</button>
            </div>
            <nav id="sectionNav" aria-label="Sections"></nav>
          </div>

          <div class="reader-side-tools">
            <div class="work-search">
              <input
                id="workSearchBox"
                type="search"
                placeholder="この作品の中を検索"
                autocomplete="off"
              />
              <button id="workSearchButton" class="tool-button" type="button">検索</button>
            </div>

            <div class="reader-action-tools" id="readerActionTools">
              <details class="text-size-menu" id="textSizeMenu">
                <summary class="text-size-trigger" title="本文の文字サイズを変えます">
                  <span>Aa</span>
                </summary>
                <div class="text-size-tools" aria-label="Text size controls">
                  <button class="text-size-option" type="button" data-size="small">小</button>
                  <button class="text-size-option" type="button" data-size="medium">標準</button>
                  <button class="text-size-option" type="button" data-size="large">大</button>
                  <button class="text-size-option" type="button" data-size="xlarge">特大</button>

                  <div class="custom-text-size">
                    <label for="customTextSize">カスタム</label>
                    <div class="custom-text-size-input">
                      <input
                        id="customTextSize"
                        type="number"
                        min="8"
                        max="120"
                        step="1"
                        inputmode="numeric"
                        aria-label="本文のカスタム文字サイズ"
                      />
                      <span aria-hidden="true">px</span>
                      <button
                        id="applyCustomTextSize"
                        class="text-size-option custom-text-size-apply"
                        type="button"
                      >
                        適用
                      </button>
                    </div>
                  </div>
                </div>
              </details>

              <details class="download-menu" id="morphMenu">
            <summary class="download-trigger" title="形態解析データの取得メニューを開きます">
              <span class="download-trigger-icon" aria-hidden="true">↓</span>
              <span>Download</span>
            </summary>
            <div class="reader-tools" aria-label="Perseus morphology download controls">
              <section class="download-section">
                <h2 class="download-section-title">この作品全体</h2>
                <div class="download-controls">
                  <button
                    id="fetchAllMorphs"
                    class="tool-button"
                    type="button"
                    title="この作品に現れる未取得の語形をPerseusから順番に取得します"
                  >
                    全語形をPerseusから取得
                  </button>
                  <button
                    id="stopFetchAllMorphs"
                    class="tool-button"
                    type="button"
                    title="現在の語形の取得が終わり次第、一括取得を停止します"
                    hidden
                  >
                    ここまでで停止
                  </button>
                  <progress id="fetchAllProgress" class="fetch-progress" max="1" value="0" hidden></progress>
                </div>
                <span id="fetchAllStatus" class="fetch-status" role="status" aria-live="polite"></span>
              </section>

              <section class="download-section">
                <h2 class="download-section-title">選択範囲</h2>
                <div class="download-controls">
                  <button
                    id="fetchSelectedMorphs"
                    class="tool-button"
                    type="button"
                    title="本文で選択した範囲に含まれる未取得の語形だけをPerseusから取得します"
                    disabled
                  >
                    選択範囲を取得
                  </button>
                  <button
                    id="stopSelectedMorphs"
                    class="tool-button"
                    type="button"
                    title="現在の語形の取得が終わり次第、選択範囲の取得を停止します"
                    hidden
                  >
                    選択取得を停止
                  </button>
                  <progress id="fetchSelectedProgress" class="fetch-progress" max="1" value="0" hidden></progress>
                </div>
                <span id="fetchSelectedStatus" class="fetch-status" role="status" aria-live="polite">
                  本文をドラッグして選択すると、その範囲の語形をまとめて取得できます。
                </span>
              </section>
            </div>
              </details>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div id="searchResults" class="search-results" hidden></div>

    <main class="layout" id="layout">
      <article id="text" class="text" lang="grc"></article>
      <aside class="panel" id="morphPanel">
        <iframe
          id="morphFrame"
          name="morphFrame"
          title="Local morphology"
          src="./morph.html?v=plr-12"
        ></iframe>
      </aside>
    </main>

    <div id="selectionNoteToolbar" class="selection-note-toolbar" hidden>
      <button id="addSelectionNote" class="tool-button" type="button">
        ★ 選択範囲をメモ
      </button>
    </div>

    <div id="noteOverlay" class="note-overlay" hidden>
      <section
        class="note-dialog-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="noteDialogTitle"
      >
        <h2 id="noteDialogTitle">メモ</h2>
        <blockquote id="noteQuotePreview" class="note-quote-preview"></blockquote>

        <fieldset id="wordNoteScope" class="note-scope" hidden>
          <legend>蛍光マーカーを付ける範囲</legend>
          <label>
            <input
              type="radio"
              name="wordNoteScope"
              value="occurrence"
              checked
            />
            クリックしたこの箇所だけ
          </label>
          <label>
            <input
              type="radio"
              name="wordNoteScope"
              value="work-form"
            />
            この作品内の同じ語形すべて
          </label>
        </fieldset>

        <label for="noteMemo">メモ</label>
        <textarea
          id="noteMemo"
          rows="7"
          placeholder="空欄のままでも、蛍光マーカーとして保存できます。"
        ></textarea>
        <p id="noteDialogStatus" class="notes-status" role="status"></p>

        <div class="note-dialog-actions">
          <button
            id="noteDialogDelete"
            class="tool-button note-delete-button"
            type="button"
            hidden
          >
            メモを削除
          </button>
          <button id="noteDialogCancel" class="tool-button secondary" type="button">
            キャンセル
          </button>
          <button id="noteDialogSave" class="tool-button" type="button">
            保存
          </button>
        </div>
      </section>
    </div>


    <script src="./reader.js?v=plr-14"></script>
    <script src="./reader-notes.js?v=plr-notes-1"></script>
  </body>
</html>

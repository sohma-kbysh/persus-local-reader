<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>保存データの管理 — Perseus Local Reader</title>
  <link rel="stylesheet" href="./styles.css?v=plr-13" />
  <link rel="stylesheet" href="./data-manager.css?v=plr-2" />
  <script src="./i18n.js?v=plr-i18n-1"></script>
</head>
<body class="manager-body">
  <header class="topbar manager-topbar">
    <div class="title-block">
      <p class="breadcrumb"><a href="./">← ライブラリへ戻る</a></p>
      <h1>保存データの管理</h1>
      <p>ダウンロード済みの本文と、取得済みの単語解析データを確認・検索・削除できます。</p>
    </div>
    <button id="reloadButton" class="manager-button" type="button">再読み込み</button>
  </header>

  <main class="manager-main">
    <section class="manager-summary">
      <article class="summary-card"><span>本文データ</span><strong id="workSummary">読み込み中…</strong></article>
      <article class="summary-card"><span>単語データ</span><strong id="morphSummary">読み込み中…</strong></article>
      <article class="summary-card"><span>合計</span><strong id="totalSummary">読み込み中…</strong></article>
    </section>

    <p id="managerStatus" class="manager-status" role="status" aria-live="polite"></p>

    <section class="manager-section">
      <div class="section-heading-row">
        <div>
          <h2>ダウンロード済みの本文</h2>
          <p>本文の削除に加えて、選択した作品だけで使われている単語解析データを削除できます。他のダウンロード済み作品でも使われる語形は保持されます。</p>
        </div>
        <div class="section-heading-actions">
          <button
            id="deleteWorkMorphsButton"
            class="manager-button"
            type="button"
            disabled
          >
            選択した作品専用の単語を削除
          </button>
          <button
            id="deleteWorksButton"
            class="manager-button danger"
            type="button"
            disabled
          >
            選択した本文を削除
          </button>
        </div>
      </div>
      <div class="manager-toolbar">
        <input id="workSearch" type="search" placeholder="著者名・作品名・作品ID・言語で検索" />
        <button id="selectVisibleWorks" class="manager-button" type="button">表示中をすべて選択</button>
        <button id="clearWorks" class="manager-button secondary" type="button">選択解除</button>
        <span id="workSelectionCount" class="selection-count">0件選択</span>
      </div>
      <div id="workList" class="manager-list"></div>
      <p id="workEmpty" class="manager-empty" hidden>該当する本文データはありません。</p>
    </section>

    <section class="manager-section">
      <div class="section-heading-row">
        <div>
          <h2>取得済みの単語解析データ</h2>
          <p>削除した単語は、本文中で再度クリックすると必要に応じて取得されます。</p>
        </div>
        <button id="deleteMorphsButton" class="manager-button danger" type="button" disabled>選択した単語を削除</button>
      </div>
      <div class="manager-toolbar">
        <input id="morphSearch" type="search" placeholder="語形・正規化形・見出し語・短い語義で検索" />
        <button id="selectVisibleMorphs" class="manager-button" type="button">表示中をすべて選択</button>
        <button id="clearMorphs" class="manager-button secondary" type="button">選択解除</button>
        <span id="morphSelectionCount" class="selection-count">0件選択</span>
      </div>
      <div id="morphList" class="manager-list"></div>
      <p id="morphEmpty" class="manager-empty" hidden>該当する単語データはありません。</p>
      <nav class="manager-pagination">
        <button id="morphPrev" class="manager-button secondary" type="button">前へ</button>
        <span id="morphPageInfo"></span>
        <button id="morphNext" class="manager-button secondary" type="button">次へ</button>
      </nav>
    </section>
  </main>

  <script src="./data-manager.js?v=plr-2"></script>
</body>
</html>
